<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #080c1a 0%, #0a1025 50%, #0c1220 100%);
    color: white; width: 1920px; height: 1080px; overflow: hidden; padding: 50px 60px;
  }
  @keyframes growWidth { from { width: 0; } }
  @keyframes growHeight { from { height: 0; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
  .hero-num { font-size: 88px; font-weight: 200; color: rgba(255,255,255,0.18); letter-spacing: -0.04em; line-height: 1; animation: fadeIn 0.8s ease; }
  .hero-sub { font-size: 15px; color: #64748b; margin-top: 8px; }
  .accent-line { height: 2px; width: 200px; border-radius: 1px; margin: 16px 0 24px; }
  .kpi-row { display: flex; gap: 12px; }
  .kpi { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 18px 24px; flex: 1; border-top: 2px solid transparent; animation: fadeIn 0.6s ease both; }
  .kpi:nth-child(1) { animation-delay: 0.2s; }
  .kpi:nth-child(2) { animation-delay: 0.4s; }
  .kpi:nth-child(3) { animation-delay: 0.6s; }
  .kpi-val { font-size: 32px; font-weight: 500; margin-top: 6px; }
  .chart-area { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 28px 32px; }
  .chart-title { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
  .bars { display: flex; gap: 16px; height: 260px; padding-top: 20px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
  .bar-wrap { flex: 1; width: 100%; position: relative; }
  .bar { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 6px 6px 0 0; }
  .bar-label { font-size: 11px; color: #64748b; }
  .inv-section { margin-top: 32px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 28px 32px; }
  .inv-title { font-size: 15px; color: rgba(255,255,255,0.4); margin-bottom: 20px; font-weight: 500; }
  .inv-row { display: grid; grid-template-columns: 200px 160px 120px 1fr; align-items: center; gap: 16px; padding: 14px 20px; background: rgba(255,255,255,0.02); border-radius: 10px; margin: 6px 0; animation: fadeIn 0.5s ease both; }
  .inv-row:nth-child(2) { animation-delay: 0.3s; }
  .inv-row:nth-child(3) { animation-delay: 0.5s; }
  .inv-row:nth-child(4) { animation-delay: 0.7s; }
  .inv-row:nth-child(5) { animation-delay: 0.9s; }
  .inv-name { font-size: 14px; color: rgba(255,255,255,0.5); font-weight: 500; }
  .inv-amount { font-size: 13px; color: #64748b; }
  .inv-irr { font-size: 14px; font-weight: 600; }
  .inv-bar-bg { height: 5px; background: rgba(255,255,255,0.04); border-radius: 3px; }
  .inv-bar { height: 100%; border-radius: 3px; animation: growWidth 1s cubic-bezier(0.4,0,0.2,1) both; }
  .inv-row:nth-child(2) .inv-bar { animation-delay: 0.5s; }
  .inv-row:nth-child(3) .inv-bar { animation-delay: 0.7s; }
  .inv-row:nth-child(4) .inv-bar { animation-delay: 0.9s; }
  .inv-row:nth-child(5) .inv-bar { animation-delay: 1.1s; }
  .bottom { position: absolute; bottom: 30px; left: 60px; right: 60px; display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.08); }
</style>
</head>
<body>
  <div class="top-grid">
    <div>
      <div class="accent-line" style="background: linear-gradient(90deg, #10b981, transparent);"></div>
      <p class="hero-num">$892K</p>
      <p class="hero-sub">Distributed this quarter</p>
      <div style="margin-top: 32px;">
        <div class="kpi-row">
          <div class="kpi" style="border-top-color: #10b981;"><div class="label">IRR</div><div class="kpi-val" style="color: #10b981;">19.4%</div></div>
          <div class="kpi" style="border-top-color: #3b82f6;"><div class="label">LTV</div><div class="kpi-val" style="color: #3b82f6;">72%</div></div>
          <div class="kpi" style="border-top-color: #8b5cf6;"><div class="label">Investors</div><div class="kpi-val" style="color: #8b5cf6;">12</div></div>
        </div>
      </div>
    </div>
    <div class="chart-area">
      <p class="chart-title">Quarterly Returns</p>
      <div class="bars">
        <div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:55%;background:linear-gradient(to top,#10b981,#10b98155);"></div></div><span class="bar-label">Q1</span></div>
        <div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:70%;background:linear-gradient(to top,#10b981,#10b98155);"></div></div><span class="bar-label">Q2</span></div>
        <div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:45%;background:linear-gradient(to top,#3b82f6,#3b82f655);"></div></div><span class="bar-label">Q3</span></div>
        <div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:82%;background:linear-gradient(to top,#3b82f6,#3b82f655);"></div></div><span class="bar-label">Q4</span></div>
        <div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:60%;background:linear-gradient(to top,#8b5cf6,#8b5cf655);"></div></div><span class="bar-label">Q1</span></div>
        <div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:95%;background:linear-gradient(to top,#8b5cf6,#8b5cf655);"></div></div><span class="bar-label">Q2</span></div>
        <div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:72%;background:linear-gradient(to top,#06b6d4,#06b6d455);"></div></div><span class="bar-label">Q3</span></div>
        <div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:88%;background:linear-gradient(to top,#06b6d4,#06b6d455);"></div></div><span class="bar-label">Q4</span></div>
      </div>
    </div>
  </div>
  <div class="inv-section">
    <p class="inv-title">Active Investors</p>
    <div class="inv-row"><span class="inv-name">J. Martinez</span><span class="inv-amount">$120K deployed</span><span class="inv-irr" style="color:#10b981;">22.1% IRR</span><div class="inv-bar-bg"><div class="inv-bar" style="width:88%;background:linear-gradient(90deg,#10b981,#10b98133);"></div></div></div>
    <div class="inv-row"><span class="inv-name">S. Rodriguez</span><span class="inv-amount">$85K deployed</span><span class="inv-irr" style="color:#10b981;">18.7% IRR</span><div class="inv-bar-bg"><div class="inv-bar" style="width:74%;background:linear-gradient(90deg,#10b981,#10b98133);"></div></div></div>
    <div class="inv-row"><span class="inv-name">A. Chen</span><span class="inv-amount">$200K deployed</span><span class="inv-irr" style="color:#3b82f6;">21.3% IRR</span><div class="inv-bar-bg"><div class="inv-bar" style="width:85%;background:linear-gradient(90deg,#3b82f6,#3b82f633);"></div></div></div>
    <div class="inv-row"><span class="inv-name">R. Patel</span><span class="inv-amount">$150K deployed</span><span class="inv-irr" style="color:#3b82f6;">20.5% IRR</span><div class="inv-bar-bg"><div class="inv-bar" style="width:82%;background:linear-gradient(90deg,#3b82f6,#3b82f633);"></div></div></div>
  </div>
  <div class="bottom"><span>Tumai AI</span><span>Capital Overview</span></div>
</body>
</html>
